dataset:
  provider: synthetic
  symbols: []
  test_size: 0.2
  start_date: null
  end_date: null

target:
  name: realized_volatility
  horizon: 5

features:
  price:
    enabled: true
  volatility:
    windows: [5, 10, 21, 63]
  sma:
    windows: [5, 10, 21, 50]
  ema:
    windows: [10, 21, 50]
  rsi:
    enabled: true
    period: 14
  atr:
    enabled: true
    period: 14
  volume:
    enabled: true

model:
  name: linear_regression
  parameters: {}

hardware:
  device: cpu

output:
  directory: results/
